name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build & run tests
        working-directory: src/logitrack-back
        run: |
          chmod +x mvnw
          ./mvnw clean verify

  frontend:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/logitrack-front/logitrack-front/package-lock.json

      - name: Install dependencies
        working-directory: src/logitrack-front/logitrack-front
        run: npm ci

      - name: Lint
        working-directory: src/logitrack-front/logitrack-front
        run: npm run lint

      - name: Build
        working-directory: src/logitrack-front/logitrack-front
        run: npm run build

  ml:
    name: ML - Python Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        working-directory: src/logitrack-ml
        run: pip install -r requirements.txt

      - name: Generate dataset
        working-directory: src/logitrack-ml
        run: python generate_dataset.py

      - name: Train model
        working-directory: src/logitrack-ml
        run: python train_model.py
